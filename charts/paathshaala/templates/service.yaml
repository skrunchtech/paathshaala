apiVersion: v1
kind: Service
metadata:
  name: {{ include "paathshaala.fullname" . }}
  labels:
    {{- include "paathshaala.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      {{- if .Values.authProxy.enabled }}
      targetPort: proxy
      {{- else }}
      targetPort: http
      {{- end }}
      protocol: TCP
      name: http
  selector:
    {{- include "paathshaala.selectorLabels" . | nindent 4 }}

