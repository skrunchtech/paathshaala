{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "paathshaala.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "paathshaala.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "paathshaala.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.migrations.command | nindent 12 }}
          envFrom:
            - secretRef:
                name: paathshaala-secrets
            {{- if .Values.postgres.enabled }}
            - secretRef:
                name: paathshaala-database-secrets
            {{- end }}
            {{- range .Values.extraSecrets }}
            - secretRef:
                name: {{ .name }}
            {{- end }}
          {{- if .Values.litellm.enabled }}
          env:
            - name: LITELLM_API_URL
              value: {{ .Values.litellm.serviceUrl | quote }}
          {{- end }}
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
{{- end }}

