apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paathshaala
  namespace: argocd
  annotations:
    
    notifications.argoproj.io/subscribe.on-deployed.: ""
    notifications.argoproj.io/subscribe.on-sync-failed.: ""
    notifications.argoproj.io/subscribe.on-health-degraded.: ""
    
spec:
  project: default
  source:
    repoURL: 
    targetRevision: main
    path: charts/paathshaala
  destination:
    server: https://kubernetes.default.svc
    namespace: paathshaala
  syncPolicy:
    
    syncOptions:
      - CreateNamespace=true
